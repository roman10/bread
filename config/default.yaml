mode: paper

app:
  log_level: INFO
  timezone: "America/New_York"

db:
  path: "data/bread.db"

data:
  default_timeframe: "1Day"
  lookback_days: 200
  request_timeout_seconds: 30
  max_retries: 3

indicators:
  sma_periods: [20, 50, 200]
  ema_periods: [9, 21]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  bollinger_period: 20
  bollinger_stddev: 2.0
  volume_sma_period: 20

strategies:
  - name: etf_momentum
    config_path: strategies/etf_momentum.yaml

backtest:
  initial_capital: 10000.0
  commission_per_trade: 0.0
  slippage_pct: 0.001

risk:
  risk_pct_per_trade: 0.005
  max_positions: 5
  max_position_pct: 0.20
  max_asset_class_pct: 0.40
  max_daily_loss_pct: 0.015
  max_weekly_loss_pct: 0.03
  max_drawdown_pct: 0.07
  pdt_enabled: true
  asset_classes:
    equity_broad: [SPY, QQQ, IWM, DIA]
    financials: [XLF]
    technology: [XLK]
    energy: [XLE]
    healthcare: [XLV]
    commodities: [GLD]
    fixed_income: [TLT]

execution:
  tick_interval_minutes: 15
  take_profit_ratio: 2.0
