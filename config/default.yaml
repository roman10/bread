mode: paper

universe_providers:
  default_etfs:
    type: predefined
    symbols: [SPY, QQQ, IWM, DIA, XLF, XLK, XLE, XLV, GLD, TLT]
  sp500:
    type: index
    index: sp500
    ttl_days: 7
  nasdaq100:
    type: index
    index: nasdaq100
    ttl_days: 7

asset_class_mapping:
  "Information Technology": technology
  "Health Care": healthcare
  "Financials": financials
  "Consumer Discretionary": consumer_discretionary
  "Communication Services": communication
  "Industrials": industrials
  "Consumer Staples": consumer_staples
  "Energy": energy
  "Utilities": utilities
  "Real Estate": real_estate
  "Materials": materials

app:
  log_level: INFO
  timezone: "America/New_York"

db:
  path: "data/bread.db"

data:
  default_timeframe: "1Day"
  lookback_days: 200
  request_timeout_seconds: 30
  max_retries: 3

indicators:
  sma_periods: [20, 50, 200]
  ema_periods: [9, 21]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  bollinger_period: 20
  bollinger_stddev: 2.0
  volume_sma_period: 20
  return_periods: [5, 10, 20]

strategies:
  - name: etf_momentum
    config_path: strategies/etf_momentum.yaml
  - name: bb_mean_reversion
    config_path: strategies/bb_mean_reversion.yaml
  - name: macd_trend
    config_path: strategies/macd_trend.yaml
  - name: ema_crossover
    config_path: strategies/ema_crossover.yaml
  - name: sector_rotation
    config_path: strategies/sector_rotation.yaml
  - name: risk_off_rotation
    config_path: strategies/risk_off_rotation.yaml
  - name: breakout_squeeze
    config_path: strategies/breakout_squeeze.yaml
  - name: macd_divergence
    config_path: strategies/macd_divergence.yaml
  - name: gap_fade
    config_path: strategies/gap_fade.yaml

backtest:
  initial_capital: 10000.0
  commission_per_trade: 0.0
  slippage_pct: 0.001

risk:
  risk_pct_per_trade: 0.005
  max_positions: 5
  max_position_pct: 0.20
  max_asset_class_pct: 0.40
  max_daily_loss_pct: 0.015
  max_weekly_loss_pct: 0.03
  max_drawdown_pct: 0.07
  pdt_enabled: true
  asset_classes:
    equity_broad: [SPY, QQQ, IWM, DIA]
    financials: [XLF]
    technology: [XLK]
    energy: [XLE]
    healthcare: [XLV]
    commodities: [GLD]
    fixed_income: [TLT]

execution:
  tick_interval_minutes: 15
  take_profit_ratio: 2.0
  paper_cost:
    enabled: true
    slippage_pct: 0.001        # 0.1% — matches backtest default
    commission_per_trade: 0.0  # per side; Alpaca is commission-free

alerts:
  enabled: false
  urls: []
  on_trade: true
  on_daily_summary: true
  on_risk_breach: true
  on_error: true
  on_research: true
  rate_limit_seconds: 60

claude:
  enabled: false
  cli_path: "claude"
  default_model: "sonnet"
  review_model: "sonnet"
  research_model: "sonnet"
  timeout_seconds: 60
  max_turns: 3
  review_mode: "advisory"
  research_enabled: false
  research_interval_hours: 4
  circuit_breaker_max_failures: 3
  circuit_breaker_cooldown_seconds: 300
