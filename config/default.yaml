mode: paper

app:
  log_level: INFO
  timezone: "America/New_York"

db:
  path: "data/bread.db"

data:
  default_timeframe: "1Day"
  lookback_days: 200
  request_timeout_seconds: 30
  max_retries: 3

indicators:
  sma_periods: [20, 50, 200]
  ema_periods: [9, 21]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  bollinger_period: 20
  bollinger_stddev: 2.0
  volume_sma_period: 20

strategies:
  - name: etf_momentum
    config_path: strategies/etf_momentum.yaml

backtest:
  initial_capital: 10000.0
  commission_per_trade: 0.0
  slippage_pct: 0.001
